# ── EMS Unified Backend ─────────────────────────────────────────────────────
# Single Spring Boot app replacing: login-service (8081), employee-service (8085),
#   hr-service (8089), management-service (8092), and the gateway (8080).
# Frontend dev server stays on port 3000 (or 5500) as before.
# ────────────────────────────────────────────────────────────────────────────

spring.application.name=ems-unified
server.port=8080

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/emp}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
spring.web.resources.static-locations=file:uploads/,classpath:/static/

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:ems-hr-pulse-super-secret-key-change-in-production-2024}
app.jwt.expiration-ms=86400000

# ── CORS ──────────────────────────────────────────────────────────────────────
# Frontend dev servers (Python 3000/5500, Live Server 5500, file://)
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.indent-output=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ── Compression ───────────────────────────────────────────────────────────────
server.compression.enabled=true
server.compression.min-response-size=1024

# ── Flyway (disable – schema managed externally via ems_enterprise_schema.sql) ─
spring.flyway.enabled=false


# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
